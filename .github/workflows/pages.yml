name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build the landing page
  build:
    name: Build Landing Page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Ensure demo GIF directory exists (with fallback)
      - name: Setup assets
        run: |
          mkdir -p docs/landing-page/assets
          # If no demo.gif exists, create a placeholder (landing page has JS fallback)
          if [ ! -f docs/landing-page/assets/demo.gif ]; then
            echo "No demo.gif found - landing page will use terminal typing fallback"
          fi

      # Validate HTML
      - name: Validate HTML
        uses: anishathalye/proof-html@v2
        with:
          directory: docs/landing-page
          enforce_https: false
          url_ignore: |
            fonts.googleapis.com
            fonts.gstatic.com
          allow_failure: true

      # Copy landing page to dist
      - name: Prepare deployment
        run: |
          mkdir -p _site
          cp -r docs/landing-page/* _site/
          # Ensure index.html exists at root
          if [ ! -f _site/index.html ]; then
            echo "Error: index.html not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
