<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a20"/>
      <stop offset="100%" style="stop-color:#0d0d0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="50%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#89b4fa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Terminal border -->
  <rect x="8" y="8" width="84" height="84" rx="14" fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <!-- Window controls -->
  <circle cx="24" cy="22" r="4" fill="#f38ba8"/>
  <circle cx="38" cy="22" r="4" fill="#f9e2af"/>
  <circle cx="52" cy="22" r="4" fill="#a6e3a1"/>
  <!-- Music note bar chart -->
  <rect x="20" y="48" width="8" height="24" rx="2" fill="url(#accent)"/>
  <rect x="36" y="36" width="8" height="36" rx="2" fill="url(#accent)"/>
  <rect x="52" y="44" width="8" height="28" rx="2" fill="url(#accent)"/>
  <rect x="68" y="52" width="8" height="20" rx="2" fill="url(#accent)"/>
  <!-- Cursor -->
  <rect x="82" y="72" width="3" height="12" fill="#cba6f7" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
